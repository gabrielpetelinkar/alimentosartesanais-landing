  - canal: meta-ads
    angulo: AV01 (principal) + AV03 (variação curiosidade)
    formato: "Headline + body 3-4 linhas + CTA"
    temperatura: frio-morno
  - canal: reels-organicos
    angulo: AV01 + AV02
    formato: "Gancho → valor → CTA (60s)"
    temperatura: frio
  - canal: stories
    angulo: AV04 (autoridade) + AV01
    formato: "Bastidor → valor → prova → CTA"
    temperatura: morno-quente
  - canal: email
    angulo: AV01 (nurture) + AV04 (autoridade)
    formato: "Email curto, direto, link claro"
    temperatura: morno
  - canal: whatsapp
    angulo: AV01 + urgência real
    formato: "Mensagem curta + link"
    temperatura: quente
