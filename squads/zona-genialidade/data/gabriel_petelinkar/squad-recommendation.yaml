      score: 0.10
      motivo: |
        Apesar de ser sobre conteúdo (área de Gabriel), Content Distillery é sobre DESTILAÇÃO
        analítica — curar, categorizar, estruturar. Requer Fact Finder 7+ e Follow Thru 6+.
        Gabriel é criador de conteúdo, não curador de conteúdo.
