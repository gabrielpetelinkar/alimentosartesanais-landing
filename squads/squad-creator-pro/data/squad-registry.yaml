  aios-intel:
    path: squads/aios-intel/
    version: 2.1.0
    description: 'External intelligence intake squad for the AIOS ecosystem. Ingests
      tips, advice, and best practices from the Claude Code community, analyzes them
      against the existing ecosystem, validates with engineering rigor, classifies
      as ADOPT/TRIAL/ASSESS/HOLD, and implements approved improvements via PDCA cycle.
      Also scans external GitHub repos for structural comparison, evaluates tools
      (CLIs, MCPs, libraries) for adoption, and smoke-tests them in our environment.
      Based on 6 elite minds: Boyd (OODA), Wardley (Maps), Kim (Three Ways), Ford/ThoughtWorks
      (Tech Radar), Goldratt (TOC), Deming (PDCA).'
