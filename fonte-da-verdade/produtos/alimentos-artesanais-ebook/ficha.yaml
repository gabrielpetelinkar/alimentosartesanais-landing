# ─── Produto ─────────────────────────────────────────────────────────────────
produto:
  titulo: "Como Criar, Vender e Escalar Alimentos Artesanais"
  subtitulo: "O guia prático de quem faz para quem quer começar a cobrar o que seu produto vale"
  formato_entrega: ebook digital (PDF + leitura online)
  garantia: 7 dias, sem burocracia
  mecanismo_central: "3 pilares — Criar / Vender / Escalar"

  pilares:
    - pilar: CRIAR
      descricao: "Fazer seu produto parecer tão bom quanto ele é (embalagem, rótulo, história)"
      capitulos: 1-7
      cor_ebook: Terracotta (#B5563A)
    - pilar: VENDER
      descricao: "Cobrar 2x a 3x mais sem mudar a receita (narrativa, canal, posicionamento)"
      capitulos: 8-11
      cor_ebook: Marrom Quente (#8B5E3C)
    - pilar: ESCALAR
      descricao: "Crescer sem perder a alma artesanal (parcerias, selos, canais premium)"
      capitulos: 12-15
      cor_ebook: Verde Oliva (#5A7A42)

  conteudos:
    - "Estratégias de precificação premium"
    - "Como montar embalagem que vende"
    - "Como acessar empórios e restaurantes"
    - "Como transformar degustação em venda"
    - "Como escalar sem perder identidade artesanal"
    - "Rótulo: o que a lei exige vs o que vende"
    - "Ingredientes nativos brasileiros que dobram o valor percebido"
    - "Canais de venda: feira vs empório vs restaurante"

  bonus:
    - nome: "Guia de Rótulo"
      descricao: "O que a lei exige em rótulos de alimentos artesanais"
    - nome: "Lista de Fornecedores Verificados"
      descricao: "Fornecedores de embalagem e ingredientes verificados pelo expert"
    - nome: "Checklist: 7 Ajustes de Valorização sem Investimento"
      descricao: "7 mudanças que não custam nada e já elevam percepção de valor"

  order_bump_futuro: "Checklist Premium de Precificação — R$17 adicional no checkout"
  upsell_futuro: "Consultoria / Curso / Mentoria (ticket alto)"

