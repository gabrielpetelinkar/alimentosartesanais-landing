# ─── Contexto de Mercado ─────────────────────────────────────────────────────
mercado:
  nome: "Mercado de Alimentos Artesanais Brasileiros"
  sofisticacao: "Stage 3-4"
  descricao: >
    Mercado em crescimento acelerado pós-pandemia com explosão de empreendedores
    artesanais (geleias, molhos, queijos, embutidos, conservas, chocolates, etc.).
    Maioria opera sem sistema: vende por indicação, WhatsApp e feiras, cobra barato
    por falta de metodologia de posicionamento. Conteúdo educativo existe mas é
    escasso com credencial real de quem produz.
  tamanho_estimado: "Mercado de alimentação artesanal BR: R$8+ bilhões (SEBRAE 2024)"
  crescimento: "Crescimento de 30%+ ao ano em empreendimentos artesanais (SEBRAE)"
  dor_dominante: "Saber fazer mas não saber cobrar — guerra de preço com industrializado"
  momento_cultural: "Valorização do artesanal, origem, ingredientes locais, história por trás do produto"

