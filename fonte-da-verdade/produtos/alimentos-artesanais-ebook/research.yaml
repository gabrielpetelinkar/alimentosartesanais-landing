# ─── Ângulos Virgens ─────────────────────────────────────────────────────────
angulos_virgens:

  - id: AV01
    nome: "O Problema Não É O Produto"
    descricao: >
      Reframe central: o artesão acha que precisa melhorar a receita.
      Na verdade, a receita já é boa. O problema é como apresenta.
      Embalagem, história, canal — isso muda o preço, não a receita.
    big_idea: "Seu produto vale 3x mais. O que falta não é receita melhor — é a história certa."
    nivel_consciencia_alvo: solution_aware
    cta_natural: "Descubra os 3 pilares que fazem isso acontecer"
    prova_necessaria: "Antes/depois da Chilliepig (mesmo produto, reposicionamento)"
    status: PRINCIPAL  # ângulo primário do produto

  - id: AV02
    nome: "Cobrar Caro Não É Ganância — É Sobrevivência"
    descricao: >
      Muitos artesãos cobram barato por vergonha ou "humildade".
      Na verdade, cobrar barato é insustentável: você não consegue
      comprar matéria-prima boa, não consegue crescer, desiste.
      Cobrar o que vale é o que mantém o artesanal vivo.
    big_idea: "Artesão que cobra barato não é humilde. É insustentável."
    nivel_consciencia_alvo: problem_aware
    cta_natural: "Aprenda a cobrar o que seu produto vale de verdade"
    prova_necessaria: "Dado sobre desistência de artesãos por inviabilidade financeira"
    status: SECUNDÁRIO

  - id: AV03
    nome: "O Café Especial Não É Melhor Que Sua Geleia"
    descricao: >
      Café especial cobra R$80 a embalagem. Geleia artesanal cobra R$12.
      Não é porque o café é melhor — é porque ele comunica melhor.
      Embalagem. História. Canal. Isso é o que faz a diferença de preço.
    big_idea: "O café especial cobra 6x mais não porque é melhor. É porque conta melhor."
    nivel_consciencia_alvo: solution_aware
    cta_natural: "Aprenda a comunicar tão bem quanto o café especial"
    prova_necessaria: "Comparativo visual produto genérico vs premium mesmo produto"
    status: SECUNDÁRIO  # ótimo para ads

  - id: AV04
    nome: "12 Anos Vs 1 Ebook de R$27"
    descricao: >
      Ângulo de autoridade + valor absurdo. Gabriel tem 12 anos, uma marca real,
      foi jurado nacional. Colocou tudo isso num ebook de R$27.
      Absurdo de valor — o que ele pagou em tempo, você paga R$27.
    big_idea: "12 anos de erros e acertos. R$27 pra você não repetir os mesmos."
    nivel_consciencia_alvo: product_aware
    cta_natural: "Quero os 12 anos comprimidos em um guia"
    prova_necessaria: "Credenciais do expert + Chilliepig como evidência"
    status: SECUNDÁRIO  # forte para retargeting

  - id: AV05
    nome: "Feira É Armadilha, Não Destino"
    descricao: >
      Muitos artesãos ficam presos na feira porque não sabem como entrar
      em empórios e restaurantes. Feira é o lugar onde você compete por preço.
      Empório é onde você compete por valor. O ebook ensina a transição.
    big_idea: "Se você só vende em feira, está na guerra errada."
    nivel_consciencia_alvo: solution_aware
    cta_natural: "Aprenda a entrar em empórios e restaurantes premium"
    prova_necessaria: "Case da Chilliepig entrando em empórios"
    status: NICHO  # forte para segmento específico

  - id: AV06
    nome: "Ingrediente Nativo = Premium Automático (Se Souber Comunicar)"
    descricao: >
      Brasil tem os ingredientes mais únicos do mundo (baru, cumaru, jatobá,
      pimenta-de-cheiro, jambu, etc.). Artesão que usa isso tem diferencial
      automático — mas 90% não sabe comunicar. O ebook ensina.
    big_idea: "Você está sentado em ouro e cobrando preço de ferro."
    nivel_consciencia_alvo: solution_aware
    cta_natural: "Aprenda a monetizar o que você já tem"
    prova_necessaria: "Exemplo específico de produto com ingrediente nativo e preço premium"
    status: NICHO  # forte para produtores com ingredientes regionais

