.gallery.open { display: flex; flex-wrap: wrap; gap: 8px; }
.gallery img { width: 120px; height: 80px; object-fit: cover; border-radius: 4px; cursor: grab; border: 2px solid transparent; transition: border-color 0.2s; }
.gallery img:hover { border-color: #D4A843; }
.search { background: #222; border: 1px solid #333; color: #eee; padding: 8px 12px; border-radius: 6px; width: 300px; margin-bottom: 10px; font-size: 13px; }

.aula { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; margin-bottom: 16px; overflow: hidden; }
.aula-header { background: #222; padding: 12px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
.aula-header h2 { font-size: 16px; color: #D4A843; }
.aula-header .count { font-size: 12px; color: #666; }
.aula-body { display: none; padding: 16px; }
.aula-body.open { display: block; }

.slot { display: flex; gap: 16px; align-items: center; padding: 12px; margin-bottom: 8px; background: #222; border-radius: 6px; border: 2px solid transparent; transition: border-color 0.2s; cursor: pointer; }
.slot.dragover { border-color: #D4A843; background: #2a2208; }
.slot-preview { width: 180px; height: 120px; border-radius: 6px; background: #333; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
.slot-preview img { width: 100%; height: 100%; object-fit: cover; }
.slot-preview .empty { color: #555; font-size: 11px; text-align: center; padding: 10px; }
.slot-info { flex: 1; }
.slot-info .slide-name { font-size: 13px; font-weight: 600; color: #ccc; margin-bottom: 4px; }
.slot-info .current-file { font-size: 11px; color: #D4A843; margin-top: 4px; font-family: monospace; word-break: break-all; }
.slot-actions button { background: #333; border: 1px solid #444; color: #e55; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
.slot-actions button:hover { background: #444; }

.picker-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200; padding: 20px; overflow-y: auto; display: flex; flex-wrap: wrap; gap: 10px; align-content: flex-start; }
.picker-overlay .close-btn { position: fixed; top: 10px; right: 20px; background: #D4A843; color: #111; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 700; z-index: 201; font-size: 14px; }
.picker-overlay .search-picker { position: fixed; top: 10px; left: 20px; background: #222; border: 1px solid #D4A843; color: #eee; padding: 10px 16px; border-radius: 6px; width: 300px; font-size: 14px; z-index: 201; }
.picker-overlay img { width: 220px; height: 150px; object-fit: cover; border-radius: 6px; cursor: pointer; border: 3px solid transparent; transition: all 0.2s; margin-top: 50px; }
.picker-overlay img:hover { border-color: #D4A843; transform: scale(1.03); }
.picker-overlay .img-label { width: 220px; text-align: center; font-size: 10px; color: #888; word-break: break-all; margin-top: -4px; }

.export-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #222; border-top: 2px solid #D4A843; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
.export-bar .changes { color: #999; font-size: 13px; }
.export-bar .changes strong { color: #D4A843; }
.export-bar button { background: #D4A843; color: #111; border: none; padding: 10px 24px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 14px; }
.export-bar button:hover { background: #e5b94d; }
body { padding-bottom: 70px; }

let changes = {};
let changeCount = 0;

// --- Render ---
function renderGallery() {
  const gallery = document.getElementById('gallery');
  gallery.innerHTML = '';
  ALL_IMAGES.forEach((img, idx) => {
    const el = document.createElement('img');
    el.src = ASSETS_PATH + '/' + img;
    el.alt = img;
    el.title = img;
    el.draggable = true;
    el.dataset.idx = idx;
    el.addEventListener('dragstart', (e) => {
      e.dataTransfer.setData('text/plain', String(idx));
    });
    gallery.appendChild(el);
  });
}

function renderAulas() {
  const container = document.getElementById('aulas');
  container.innerHTML = '';

  for (const [aulaFile, slots] of Object.entries(SLOTS_DATA)) {
    const aulaDiv = document.createElement('div');
    aulaDiv.className = 'aula';

    const header = document.createElement('div');
    header.className = 'aula-header';
    const aulaName = aulaFile.replace('.html', '').replace('aula-', 'Aula ').replace(/-/g, ' ');
    header.innerHTML = '<h2>' + aulaName + '</h2><span class="count">' + slots.length + ' fotos</span>';
    header.addEventListener('click', function() {
      this.nextElementSibling.classList.toggle('open');
    });
    aulaDiv.appendChild(header);

    const body = document.createElement('div');
    body.className = 'aula-body';

    slots.forEach((slot, i) => {
      const slotDiv = document.createElement('div');
      slotDiv.className = 'slot';
      slotDiv.dataset.aula = aulaFile;
      slotDiv.dataset.idx = i;

      // Drag events
      slotDiv.addEventListener('dragover', (e) => { e.preventDefault(); slotDiv.classList.add('dragover'); });
      slotDiv.addEventListener('dragleave', () => slotDiv.classList.remove('dragover'));
      slotDiv.addEventListener('drop', (e) => {
        e.preventDefault();
        slotDiv.classList.remove('dragover');
        const imgIdx = parseInt(e.dataTransfer.getData('text/plain'));
        if (!isNaN(imgIdx)) applyImage(aulaFile, i, ALL_IMAGES[imgIdx]);
      });

      // Click to open picker
      slotDiv.addEventListener('click', (e) => {
        if (e.target.closest('.slot-actions')) return;
        openPicker(aulaFile, i);
      });

      const hasImg = slot.currentImage && slot.currentImage !== 'EMPTY';

      const preview = document.createElement('div');
      preview.className = 'slot-preview';
      preview.id = 'preview-' + aulaFile + '-' + i;
      if (hasImg) {
        preview.innerHTML = '<img src="' + ASSETS_PATH + '/' + encodeFilename(slot.currentImage) + '">';
      } else {
        preview.innerHTML = '<div class="empty">Clique para<br>selecionar imagem</div>';
      }
      slotDiv.appendChild(preview);

      const info = document.createElement('div');
      info.className = 'slot-info';
      info.innerHTML = '<div class="slide-name">' + escapeHtml(slot.slideName) + '</div>' +
        '<div class="current-file" id="file-' + aulaFile + '-' + i + '">' + escapeHtml(hasImg ? slot.currentImage : 'vazio') + '</div>';
      slotDiv.appendChild(info);

      const actions = document.createElement('div');
      actions.className = 'slot-actions';
      const removeBtn = document.createElement('button');
      removeBtn.textContent = '✕';
      removeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        removeImage(aulaFile, i);
      });
      actions.appendChild(removeBtn);
      slotDiv.appendChild(actions);

      body.appendChild(slotDiv);
    });

    aulaDiv.appendChild(body);
    container.appendChild(aulaDiv);
  }
}

// --- Picker ---
function openPicker(aulaFile, slotIdx) {
  const overlay = document.createElement('div');
  overlay.className = 'picker-overlay';

  const searchInput = document.createElement('input');
  searchInput.className = 'search-picker';
  searchInput.placeholder = 'Filtrar imagens...';
  searchInput.addEventListener('input', () => {
    const q = searchInput.value.toLowerCase();
    overlay.querySelectorAll('.picker-item').forEach(item => {
      item.style.display = item.dataset.name.toLowerCase().includes(q) ? '' : 'none';
    });
  });
  overlay.appendChild(searchInput);

  const closeBtn = document.createElement('button');
  closeBtn.className = 'close-btn';
  closeBtn.textContent = 'Fechar ✕';
  closeBtn.addEventListener('click', () => overlay.remove());
  overlay.appendChild(closeBtn);

  ALL_IMAGES.forEach(img => {
    const wrapper = document.createElement('div');
    wrapper.className = 'picker-item';
    wrapper.dataset.name = img;
    wrapper.style.display = 'inline-block';
    wrapper.style.textAlign = 'center';

    const imgEl = document.createElement('img');
    imgEl.src = ASSETS_PATH + '/' + encodeFilename(img);
    imgEl.title = img;
    imgEl.addEventListener('click', () => {
      applyImage(aulaFile, slotIdx, img);
      overlay.remove();
    });
    wrapper.appendChild(imgEl);

    const label = document.createElement('div');
    label.className = 'img-label';
    label.textContent = img;
    wrapper.appendChild(label);

    overlay.appendChild(wrapper);
  });

  document.body.appendChild(overlay);
  setTimeout(() => searchInput.focus(), 100);
}

// --- Actions ---
function applyImage(aulaFile, slotIdx, imgName) {
  const preview = document.getElementById('preview-' + aulaFile + '-' + slotIdx);
  const fileLabel = document.getElementById('file-' + aulaFile + '-' + slotIdx);

  preview.innerHTML = '<img src="' + ASSETS_PATH + '/' + encodeFilename(imgName) + '">';
  fileLabel.textContent = imgName;

  if (!changes[aulaFile]) changes[aulaFile] = {};
  changes[aulaFile][slotIdx] = imgName;
  changeCount++;
  document.getElementById('changeCount').textContent = changeCount;
}

function removeImage(aulaFile, slotIdx) {
  const preview = document.getElementById('preview-' + aulaFile + '-' + slotIdx);
  const fileLabel = document.getElementById('file-' + aulaFile + '-' + slotIdx);

  preview.innerHTML = '<div class="empty">Clique para<br>selecionar imagem</div>';
  fileLabel.textContent = 'vazio';

  if (!changes[aulaFile]) changes[aulaFile] = {};
  changes[aulaFile][slotIdx] = null;
  changeCount++;
  document.getElementById('changeCount').textContent = changeCount;
}

// --- Export ---
function generateScript() {
  if (Object.keys(changes).length === 0) {
    alert('Nenhuma alteração feita.');
    return;
  }

  const lines = [];
  lines.push("import { readFileSync, writeFileSync } from 'fs';");
  lines.push("");
  lines.push("const ASSETS_REL = '../assets/aulas';");
  lines.push("");
  lines.push("function setImageAtLine(html, targetLine, imgFile) {");
  lines.push("  const lines = html.split('\\n');");
  lines.push("  const line = lines[targetLine - 1];");
  lines.push("  if (!line) return html;");
  lines.push("  const bgStyle = `background:url('${ASSETS_REL}/${imgFile}') center/cover no-repeat !important;`;");
  lines.push("  if (line.includes('background:url(') || line.includes('background:')) {");
  lines.push("    lines[targetLine - 1] = line.replace(/background:[^;]*(?:!important)?;?/g, bgStyle);");
  lines.push("  } else if (line.includes('style=\"')) {");
  lines.push("    lines[targetLine - 1] = line.replace('style=\"', 'style=\"' + bgStyle + ' ');");
  lines.push("  } else if (line.includes('class=\"')) {");
  lines.push("    lines[targetLine - 1] = line.replace('class=\"', 'style=\"' + bgStyle + '\" class=\"');");
  lines.push("  }");
  lines.push("  return lines.join('\\n');");
  lines.push("}");
  lines.push("");
  lines.push("function removeImageAtLine(html, targetLine) {");
  lines.push("  const lines = html.split('\\n');");
  lines.push("  const line = lines[targetLine - 1];");
  lines.push("  if (!line) return html;");
  lines.push("  lines[targetLine - 1] = line.replace(/background:url\\([^)]+\\)[^;]*!important;?\\s*/g, '');");
  lines.push("  return lines.join('\\n');");
  lines.push("}");
  lines.push("");

  for (const [aulaFile, idxMap] of Object.entries(changes)) {
    const slots = SLOTS_DATA[aulaFile];
    lines.push("// " + aulaFile);
    lines.push("{");
    lines.push("  let html = readFileSync('/Users/gabrielpetelinkar/AIOSORIZA/outputs/" + aulaFile + "', 'utf-8');");

    const entries = Object.entries(idxMap).sort((a, b) => slots[b[0]].line - slots[a[0]].line);
    for (const [idx, imgName] of entries) {
      const slot = slots[idx];
      if (imgName) {
        lines.push("  html = setImageAtLine(html, " + slot.line + ", " + JSON.stringify(imgName) + ");");
      } else {
        lines.push("  html = removeImageAtLine(html, " + slot.line + ");");
      }
    }
    lines.push("  writeFileSync('/Users/gabrielpetelinkar/AIOSORIZA/outputs/" + aulaFile + "', html);");
    lines.push("  console.log('✓ " + aulaFile + "');");
    lines.push("}");
    lines.push("");
  }

  const script = lines.join('\n');
  const blob = new Blob([script], { type: 'text/javascript' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'apply-image-changes.mjs';
  a.click();
  URL.revokeObjectURL(url);
  alert('Script salvo! Execute:\\nnode outputs/apply-image-changes.mjs');
}

// --- Helpers ---
function encodeFilename(name) {
  return name.split('/').map(p => encodeURIComponent(p)).join('/');
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// --- Init ---
document.getElementById('galleryToggle').addEventListener('click', () => {
  document.getElementById('gallery').classList.toggle('open');
});
document.getElementById('gallerySearch').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase();
  document.querySelectorAll('.gallery img').forEach(img => {
    img.style.display = img.title.toLowerCase().includes(q) ? '' : 'none';
  });
});
document.getElementById('exportBtn').addEventListener('click', generateScript);

renderGallery();
renderAulas();
